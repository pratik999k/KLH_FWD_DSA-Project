<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Portfolio Creator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Portfolio Creator</h1>
        <p>Create your professional portfolio instantly</p>
    </header>

    <!-- FORM -->

    <section class="form-section" id="formPage">

        <h2>Enter Your Details</h2>

        <div class="form-container">

            <input type="text" id="name" placeholder="Full Name" required>

            <input type="text" id="title" placeholder="Professional Title" required>

            <input type="file" id="image">

            <input type="email" id="email" placeholder="Email Address" required>

            <textarea id="about" placeholder="About You"></textarea>

            <textarea id="education" placeholder="Education"></textarea>

            <textarea id="experience" placeholder="Experience"></textarea>

            <input type="text" id="skills" placeholder="Skills (comma separated)">

            <button onclick="generatePortfolio()">Generate Portfolio</button>

        </div>

    </section>


    <!-- PORTFOLIO -->

    <section class="portfolio" id="portfolioPage">

        <div class="portfolio-container">

            <div class="sidebar">

                <img id="pImage" class="profile-img">

                <h2 id="pName"></h2>

                <h4 id="pTitle"></h4>

                <p id="pEmail"></p>

            </div>

            <div class="content">

                <div class="card">
                    <h3>About</h3>
                    <p id="pAbout"></p>
                </div>

                <div class="card">
                    <h3>Education</h3>
                    <p id="pEducation"></p>
                </div>

                <div class="card">
                    <h3>Skills</h3>
                    <ul id="pSkills"></ul>
                </div>

                <div class="card">
                    <h3>Experience</h3>
                    <p id="pExperience"></p>
                </div>

            </div>

        </div>

    </section>

    <script src="project.js"></script>

</body>

</html>
